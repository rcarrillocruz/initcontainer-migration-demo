# Postgres for local kind cluster testing only.
# In production use a managed database (RDS, CloudSQL, etc.) or a proper operator.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: migration-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          env:
            - name: POSTGRES_USER
              value: appuser
            - name: POSTGRES_PASSWORD
              value: apppassword
            - name: POSTGRES_DB
              value: appdb
          ports:
            - containerPort: 5432
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "appuser", "-d", "appdb"]
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 6
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: migration-demo
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
