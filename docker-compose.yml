services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: apppassword
      POSTGRES_DB: appdb
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appuser -d appdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    build: .
    command: python -m app.migrate
    environment:
      DATABASE_URL: postgresql://appuser:apppassword@postgres/appdb
    depends_on:
      postgres:
        condition: service_healthy

  app:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    environment:
      DATABASE_URL: postgresql://appuser:apppassword@postgres/appdb
    ports:
      - "8000:8000"
    depends_on:
      - migrate
